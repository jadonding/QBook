name: qbook
description: Cross-platform accounting app built with Flutter.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  go_router: ^16.0.0
  drift: ^2.28.1
  sqlite3_flutter_libs: ^0.5.31
  path_provider: ^2.1.5
  path: ^1.9.1
  dio: ^5.9.0
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  intl: ^0.20.2
  fl_chart: ^1.1.1
  flutter_secure_storage: ^10.0.0-beta.4
  file_picker: ^10.3.2
  share_plus: ^11.1.0
  local_auth: ^2.3.0
  flutter_local_notifications: ^19.4.1
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.7.0
  drift_dev: ^2.28.2
  freezed: ^3.2.3
  json_serializable: ^6.11.0

flutter:
  uses-material-design: true

